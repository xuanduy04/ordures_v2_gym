# ============================================================================
# MultiChallenge Environment Configuration
# ============================================================================
# The LLM-judge is NOT managed by NeMo-Gym. The YAML MUST supply:
#   - judge_server_url : host:port of an already-running `vllm serve` endpoint
#                  (e.g. 0.0.0.0:8000). No default is provided.
#   - judge_model: model name served at judge_server_url (validated against
#                  /v1/models at startup and sent as `model` in the judge payload).
#
# The judge is queried via {judge_server_url}/v1/chat/completions (native vLLM),
# NOT the Responses API. All rubric / aggregation / verdict / data-schema logic
# is inherited from `multichallenge_original`.
#
# This config defines the MultiChallenge environment setup.
# ============================================================================

# ============================================================================
# MultiChallenge Resources Server
# ============================================================================
multichallenge:
  resources_servers:
    multichallenge:
      entrypoint: app.py

      # MANDATED: externally-hosted LLM-judge endpoint (no default).
      judge_server_url: ""
      # MANDATED: model name served at judge_server_url (no default).
      judge_model: ""

      # Parameters for judge requests
      judge_responses_create_params:
        input: []
        max_output_tokens: 8192
        temperature: 0.7
        top_p: 0.8

      # Aggregation mode for rubric scores: mean | min | max | all | any | weighted
      aggregation_mode: mean
      parallel_evaluation: true

      # Judge system message
      judge_system_message: >-
        You are a precise evaluator. Assess responses objectively based on the given criteria.
        Analyze the response carefully against the evaluation question.

      # Judge prompt template with placeholders
      judge_prompt_template: |-
        You are evaluating whether a model's response meets a specific criterion.

        CONVERSATION CONTEXT:
        {context}

        MODEL'S FINAL RESPONSE:
        {response}

        EVALUATION QUESTION:
        {question}

        EXPECTED ANSWER: {pass_criteria}

        Does the model's response satisfy the criterion described in the evaluation question?
        Think step by step, then respond with exactly [[YES]] or [[NO]] on the last line.

      # Verdict labels
      yes_label: "[[YES]]"
      no_label: "[[NO]]"

      domain: knowledge
      description: "MultiChallenge benchmark evaluation with LLM judge"
      verified: false

# ============================================================================
# MultiChallenge Agent Configuration
# ============================================================================
multichallenge_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: multichallenge
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
        - name: multichallenge_example
          type: example
          license: "Apache 2.0"
          jsonl_fpath: resources_servers/multichallenge/data/example.jsonl
        - name: multichallenge_advanced
          type: train
          license: "TBD"
          jsonl_fpath: resources_servers/multichallenge/data/advanced.jsonl
        - name: multichallenge_vanilla
          type: train
          license: "TBD"
          jsonl_fpath: resources_servers/multichallenge/data/vanilla.jsonl
