# ============================================================================
# Math With Judge Environment Configuration
# ============================================================================
# The LLM-judge is NOT managed by NeMo-Gym. The YAML MUST supply:
#   - judge_server_url : host:port of an already-running `vllm serve` endpoint
#                  (e.g. 0.0.0.0:8000). No default is provided.
#   - judge_model: model name served at judge_server_url (validated against
#                  /v1/models at startup and sent as `model` in the judge payload).
#
# The judge is queried via {judge_server_url}/v1/chat/completions (native vLLM),
# NOT the Responses API. All verification / data-schema logic is inherited from
# `math_with_judge_original`.
#
# The judge is only invoked when should_use_judge=true AND the library verifier
# gives reward <= 0.5 (mixed-rewards strategy).
# ============================================================================

math_with_judge:
  resources_servers:
    math_with_judge:
      entrypoint: app.py
      # MANDATED: externally-hosted LLM-judge endpoint (no default).
      judge_server_url: ""
      # MANDATED: model name served at judge_server_url (no default).
      judge_model: ""
      judge_responses_create_params: {
        input: []
      }
      should_use_judge: false
      domain: math
      verified: false
      description: Math dataset with math-verify and LLM-as-a-judge
      value: Improve math capabilities including AIME 24 / 25
math_with_judge_simple_agent:
  responses_api_agents:
    simple_agent:
      entrypoint: app.py
      resources_server:
        type: resources_servers
        name: math_with_judge
      model_server:
        type: responses_api_models
        name: policy_model
      datasets:
      - name: train
        type: train
        jsonl_fpath: resources_servers/math_with_judge/data/OpenMathReasoning_train.jsonl
        huggingface_identifier:
          repo_id: nvidia/Nemotron-RL-math-OpenMathReasoning
          artifact_fpath: train.jsonl
        license: Creative Commons Attribution 4.0 International
      - name: validation
        type: validation
        jsonl_fpath: resources_servers/math_with_judge/data/OpenMathReasoning_aime24_validation.jsonl
        huggingface_identifier:
          repo_id: nvidia/Nemotron-RL-math-OpenMathReasoning
          artifact_fpath: validation.jsonl
        license: Apache 2.0
      - name: example
        type: example
        jsonl_fpath: resources_servers/math_with_judge/data/example.jsonl
